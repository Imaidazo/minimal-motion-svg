<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <style>
    /* Animações 3D para cada anel */
    @keyframes anel2 {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(-360deg) rotateY(360deg); }
    }
    
    @keyframes anel3 {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(-360deg); }
    }
    
    @keyframes pulsar {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.4); opacity: 1; }
    }
    
    /* Animação das letras - acendem e mantém brilho */
    @keyframes acenderLetra {
      0% { opacity: 0.2; }
      15% { opacity: 1; }
      100% { opacity: 1; }
    }
    
    /* Atrasos para cada letra (10 letras: C A R R E G A N D O) */
    .l1 { animation: acenderLetra 3s ease-in-out infinite; }
    .l2 { animation: acenderLetra 3s ease-in-out 0.3s infinite; }
    .l3 { animation: acenderLetra 3s ease-in-out 0.6s infinite; }
    .l4 { animation: acenderLetra 3s ease-in-out 0.9s infinite; }
    .l5 { animation: acenderLetra 3s ease-in-out 1.2s infinite; }
    .l6 { animation: acenderLetra 3s ease-in-out 1.5s infinite; }
    .l7 { animation: acenderLetra 3s ease-in-out 1.8s infinite; }
    .l8 { animation: acenderLetra 3s ease-in-out 2.1s infinite; }
    .l9 { animation: acenderLetra 3s ease-in-out 2.4s infinite; }
    .l10 { animation: acenderLetra 3s ease-in-out 2.7s infinite; }
    
    /* Aplicando as animações dos anéis */
    .anel2 { 
      animation: anel2 6s linear infinite; 
      transform-origin: 150px 150px;
      transform-style: preserve-3d;
    }
    
    .anel3 { 
      animation: anel3 10s linear infinite; 
      transform-origin: 150px 150px;
      transform-style: preserve-3d;
    }
    
    .nucleo { 
      animation: pulsar 2s ease-in-out infinite; 
      transform-origin: 150px 150px;
    }
    
    /* Texto flutuante suave */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    
    .texto { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Fundo -->
  <rect width="300" height="300" fill="#0a0e27"/>
  
  <defs>
    <radialGradient id="brilho" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0e27" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Brilho de fundo -->
  <circle cx="150" cy="150" r="112" fill="url(#brilho)"/>
  
  <!-- ANEL 2 - Médio (raio 60) - SEMPRE SÓLIDO -->
  <g class="anel2">
    <circle cx="150" cy="150" r="60" stroke="#4a8aff" stroke-width="2.5" fill="none" opacity="1"/>
  </g>
  
  <!-- ANEL 3 - Menor (raio 34) - SEMPRE SÓLIDO -->
  <g class="anel3">
    <circle cx="150" cy="150" r="34" stroke="#aad0ff" stroke-width="2.5" fill="none" opacity="1"/>
  </g>
  
  <!-- Núcleo central pulsante -->
  <g class="nucleo">
    <circle cx="150" cy="150" r="13.5" fill="#4a8aff" opacity="0.3"/>
    <circle cx="150" cy="150" r="9" fill="#7ab0ff" opacity="0.5"/>
    <circle cx="150" cy="150" r="5.25" fill="#aad0ff" opacity="0.8"/>
    <circle cx="150" cy="150" r="2.25" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Texto CARREGANDO com letras individuais -->
  <g class="texto">
    <text x="150" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" letter-spacing="4">
      <tspan class="l1" fill="#4a8aff">C</tspan>
      <tspan class="l2" fill="#4a8aff">A</tspan>
      <tspan class="l3" fill="#4a8aff">R</tspan>
      <tspan class="l4" fill="#4a8aff">R</tspan>
      <tspan class="l5" fill="#4a8aff">E</tspan>
      <tspan class="l6" fill="#4a8aff">G</tspan>
      <tspan class="l7" fill="#4a8aff">A</tspan>
      <tspan class="l8" fill="#4a8aff">N</tspan>
      <tspan class="l9" fill="#4a8aff">D</tspan>
      <tspan class="l10" fill="#4a8aff">O</tspan>
    </text>
  </g>
</svg>
