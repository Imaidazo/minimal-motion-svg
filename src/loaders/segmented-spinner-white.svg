<svg xmlns="http://www.w3.org/2000/svg"
     width="188" height="188" viewBox="0 0 188 188"
     role="img" aria-labelledby="title desc">
  <title id="title">Segmented spinner loader — white variant</title>
  <desc id="desc">Four animated segmented white rings rotate at different speeds around a static center point with pulsing loading text on a dark background.</desc>
  <style>
    @keyframes spinner1 { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes spinner2 { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
    @keyframes spinner3 { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes spinner4 { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
    .spinner1 { animation: spinner1 7.2s linear infinite; transform-origin: 94px 94px; }
    .spinner2 { animation: spinner2 4.25s linear infinite; transform-origin: 94px 94px; }
    .spinner3 { animation: spinner3 3.15s linear infinite; transform-origin: 94px 94px; }
    .spinner4 { animation: spinner4 1.875s linear infinite; transform-origin: 94px 94px; }
    @keyframes textoPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .texto { animation: textoPulse 2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .spinner1, .spinner2, .spinner3, .spinner4, .texto { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.52"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.64"/>
    </linearGradient>
    <radialGradient id="brilhoCentral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D1626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="188" height="188" fill="#0D1626"/>
  <circle cx="94" cy="94" r="82" fill="url(#brilhoCentral)"/>

  <g class="spinner1">
    <circle cx="94" cy="94" r="60" stroke="url(#grad1)" stroke-width="1.25" fill="none"
            stroke-dasharray="9.5 368" stroke-dashoffset="0" stroke-linecap="round"/>
    <circle cx="94" cy="94" r="60" stroke="url(#grad1)" stroke-width="1.25" fill="none"
            stroke-dasharray="9.5 368" stroke-dashoffset="-183" stroke-linecap="round"/>
  </g>

  <g class="spinner2">
    <circle cx="94" cy="94" r="44" stroke="url(#grad2)" stroke-width="1.5" fill="none"
            stroke-dasharray="25 69" stroke-linecap="round"/>
  </g>

  <g class="spinner3">
    <circle cx="94" cy="94" r="28" stroke="url(#grad3)" stroke-width="1.25" fill="none"
            stroke-dasharray="19 44" stroke-linecap="round"/>
  </g>

  <g class="spinner4">
    <circle cx="94" cy="94" r="14" stroke="url(#grad4)" stroke-width="1.5" fill="none"
            stroke-dasharray="16 28" stroke-linecap="round" opacity="0.9"/>
  </g>

  <circle cx="94" cy="94" r="2" fill="#FFFFFF" opacity="0.9"/>

  <g class="texto">
    <text x="94" y="174" text-anchor="middle"
          font-family="Inter, Arial, sans-serif"
          font-weight="700"
          font-size="9"
          letter-spacing="2.5"
          fill="#FFFFFF"
          opacity="0.8">CARREGANDO</text>
  </g>
</svg>