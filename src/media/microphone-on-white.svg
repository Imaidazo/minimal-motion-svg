<svg xmlns="http://www.w3.org/2000/svg" width="228" height="211" viewBox="46 27 228 211" role="img" aria-labelledby="title desc">
  <title id="title">Animação de captação e conversão de áudio</title>
  <desc id="desc">Ícone reduzido de microfone no centro de uma base arredondada em forma de Y. Círculos sem preenchimento surgem ao redor e encolhem até desaparecer no microfone. Abaixo, barras organizadas em uma sequência horizontal se movimentam em profundidade para representar a conversão do som.</desc>
  <style>
    :root { --bg:#0D1626; --primary: #FFFFFF; --secondary: #FFFFFF; --dim:.18; }
    .background{fill:var(--bg)}
    .stroke-primary{fill:none;stroke:var(--primary);stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
    .fill-primary{fill:var(--primary)}
    .signal-ring{fill:none;stroke:var(--secondary);stroke-width:3;transform-box:fill-box;transform-origin:center;opacity:0}
    .ring-1{animation:ringIn 2.4s ease-in infinite}
    .ring-2{animation:ringIn 2.4s ease-in .8s infinite}
    .ring-3{animation:ringIn 2.4s ease-in 1.6s infinite}
    @keyframes ringIn{0%{transform:scale(1);opacity:0}12%{opacity:.9}78%{opacity:.75}100%{transform:scale(.16);opacity:0}}
    .conversion-bar{fill:var(--secondary);rx:3;transform-box:fill-box;transform-origin:center;opacity:var(--dim)}
    .bar-1{animation:depth1 1.05s ease-in-out infinite alternate}
    .bar-2{animation:depth2 .82s ease-in-out .12s infinite alternate}
    .bar-3{animation:depth3 1.34s ease-in-out .28s infinite alternate}
    .bar-4{animation:depth4 .94s ease-in-out .05s infinite alternate}
    .bar-5{animation:depth5 1.18s ease-in-out .22s infinite alternate}
    .bar-6{animation:depth6 .76s ease-in-out .32s infinite alternate}
    .bar-7{animation:depth7 1.27s ease-in-out .16s infinite alternate}
    @keyframes depth1{from{transform:scaleX(.50) scaleY(.82);opacity:.20}to{transform:scaleX(1.05) scaleY(1.08);opacity:.95}}
    @keyframes depth2{from{transform:scaleX(.72) scaleY(.90);opacity:.34}to{transform:scaleX(1.24) scaleY(1.14);opacity:1}}
    @keyframes depth3{from{transform:scaleX(.42) scaleY(.76);opacity:.16}to{transform:scaleX(.94) scaleY(1.04);opacity:.88}}
    @keyframes depth4{from{transform:scaleX(.88) scaleY(.96);opacity:.46}to{transform:scaleX(1.30) scaleY(1.18);opacity:1}}
    @keyframes depth5{from{transform:scaleX(.56) scaleY(.84);opacity:.24}to{transform:scaleX(1.10) scaleY(1.10);opacity:.94}}
    @keyframes depth6{from{transform:scaleX(.76) scaleY(.91);opacity:.38}to{transform:scaleX(1.18) scaleY(1.15);opacity:1}}
    @keyframes depth7{from{transform:scaleX(.46) scaleY(.80);opacity:.18}to{transform:scaleX(.98) scaleY(1.06);opacity:.90}}
    @media (prefers-reduced-motion:reduce){.signal-ring,.conversion-bar{animation:none}.signal-ring{opacity:.35}.conversion-bar{opacity:.72}}
  </style>
  <rect class="background" x="46" y="27" width="228" height="211"/>
  <g aria-hidden="true">
    <circle class="signal-ring ring-1" cx="160" cy="125" r="82"/>
    <circle class="signal-ring ring-2" cx="160" cy="125" r="82"/>
    <circle class="signal-ring ring-3" cx="160" cy="125" r="82"/>
  </g>
  <g transform="translate(80 62.5) scale(0.5)" aria-hidden="true">
    <path class="stroke-primary" d="M112 92 C112 153 127 181 160 190 C193 181 208 153 208 92"/>
    <path class="stroke-primary" d="M160 190 L160 220"/>
    <path class="stroke-primary" d="M132 220 H188"/>
    <rect class="fill-primary" x="136" y="65" width="48" height="92" rx="24"/>
    <rect x="146" y="79" width="28" height="54" rx="14" fill="#0D1626"/>
    <rect class="fill-primary" x="157" y="145" width="6" height="24" rx="3"/>
  </g>
  <g aria-hidden="true">
    <rect class="conversion-bar bar-1" x="62"  y="219" width="22" height="6"/>
    <rect class="conversion-bar bar-2" x="91"  y="219" width="22" height="6"/>
    <rect class="conversion-bar bar-3" x="120" y="219" width="22" height="6"/>
    <rect class="conversion-bar bar-4" x="149" y="219" width="22" height="6"/>
    <rect class="conversion-bar bar-5" x="178" y="219" width="22" height="6"/>
    <rect class="conversion-bar bar-6" x="207" y="219" width="22" height="6"/>
    <rect class="conversion-bar bar-7" x="236" y="219" width="22" height="6"/>
  </g>
</svg>
