<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240" role="img" aria-labelledby="title desc">
  <title id="title">Five-column segmented audio loader</title>
  <desc id="desc">Five animated columns made of eight segments. The four side columns keep four lower segments visible while four upper segments rise sequentially. The central column keeps two lower segments visible while six upper segments rise asynchronously to simulate sound peaks.</desc>
  <style>
    :root { --bg: #0D1626; --segment-color: #123A73; --dim: 0.12; }
    .background { fill: var(--bg); }
    .segment { fill: var(--segment-color); rx: 3px; }
    .fixed { opacity: 1; }
    .dynamic { opacity: var(--dim); }
    .c1-s5 { animation: c1s5 0.45s steps(1,end) infinite; }
    .c1-s6 { animation: c1s6 0.45s steps(1,end) infinite; }
    .c1-s7 { animation: c1s7 0.45s steps(1,end) infinite; }
    .c1-s8 { animation: c1s8 0.45s steps(1,end) infinite; }
    .c2-s5 { animation: c2s5 0.20s steps(1,end) infinite; }
    .c2-s6 { animation: c2s6 0.20s steps(1,end) infinite; }
    .c2-s7 { animation: c2s7 0.20s steps(1,end) infinite; }
    .c2-s8 { animation: c2s8 0.20s steps(1,end) infinite; }
    .c3-s3 { animation: c3s3 0.65s steps(1,end) infinite; }
    .c3-s4 { animation: c3s4 0.65s steps(1,end) infinite; }
    .c3-s5 { animation: c3s5 0.65s steps(1,end) infinite; }
    .c3-s6 { animation: c3s6 0.65s steps(1,end) infinite; }
    .c3-s7 { animation: c3s7 0.65s steps(1,end) infinite; }
    .c3-s8 { animation: c3s8 0.65s steps(1,end) infinite; }
    .c4-s5 { animation: c4s5 0.38s steps(1,end) infinite; }
    .c4-s6 { animation: c4s6 0.38s steps(1,end) infinite; }
    .c4-s7 { animation: c4s7 0.38s steps(1,end) infinite; }
    .c4-s8 { animation: c4s8 0.38s steps(1,end) infinite; }
    .c5-s5 { animation: c5s5 0.68s steps(1,end) infinite; }
    .c5-s6 { animation: c5s6 0.68s steps(1,end) infinite; }
    .c5-s7 { animation: c5s7 0.68s steps(1,end) infinite; }
    .c5-s8 { animation: c5s8 0.68s steps(1,end) infinite; }
    @keyframes c1s5 { 0%,15%,62%,100%{opacity:.12} 16%,61%{opacity:1} }
    @keyframes c1s6 { 0%,23%,58%,100%{opacity:.12} 24%,57%{opacity:1} }
    @keyframes c1s7 { 0%,31%,52%,100%{opacity:.12} 32%,51%{opacity:1} }
    @keyframes c1s8 { 0%,39%,46%,100%{opacity:.12} 40%,45%{opacity:1} }
    @keyframes c2s5 { 0%,6%,78%,100%{opacity:.12} 7%,77%{opacity:1} }
    @keyframes c2s6 { 0%,14%,72%,100%{opacity:.12} 15%,71%{opacity:1} }
    @keyframes c2s7 { 0%,22%,65%,100%{opacity:.12} 23%,64%{opacity:1} }
    @keyframes c2s8 { 0%,30%,56%,100%{opacity:.12} 31%,55%{opacity:1} }
    @keyframes c3s3 { 0%,9%,86%,100%{opacity:.12} 10%,85%{opacity:1} }
    @keyframes c3s4 { 0%,17%,80%,100%{opacity:.12} 18%,79%{opacity:1} }
    @keyframes c3s5 { 0%,25%,73%,100%{opacity:.12} 26%,72%{opacity:1} }
    @keyframes c3s6 { 0%,33%,65%,100%{opacity:.12} 34%,64%{opacity:1} }
    @keyframes c3s7 { 0%,41%,56%,100%{opacity:.12} 42%,55%{opacity:1} }
    @keyframes c3s8 { 0%,49%,51%,100%{opacity:.12} 50%{opacity:1} }
    @keyframes c4s5 { 0%,28%,92%,100%{opacity:.12} 29%,91%{opacity:1} }
    @keyframes c4s6 { 0%,36%,84%,100%{opacity:.12} 37%,83%{opacity:1} }
    @keyframes c4s7 { 0%,44%,75%,100%{opacity:.12} 45%,74%{opacity:1} }
    @keyframes c4s8 { 0%,52%,66%,100%{opacity:.12} 53%,65%{opacity:1} }
    @keyframes c5s5 { 0%,4%,69%,100%{opacity:.12} 5%,68%{opacity:1} }
    @keyframes c5s6 { 0%,12%,61%,100%{opacity:.12} 13%,60%{opacity:1} }
    @keyframes c5s7 { 0%,20%,52%,100%{opacity:.12} 21%,51%{opacity:1} }
    @keyframes c5s8 { 0%,28%,43%,100%{opacity:.12} 29%,42%{opacity:1} }
    @media (prefers-reduced-motion: reduce) { .dynamic { animation: none; opacity: 0.55; } }
  </style>
  <rect class="background" width="320" height="240"/>
  <g transform="translate(34 0)">
    <rect class="segment fixed" x="0" y="174" width="36" height="8"/><rect class="segment fixed" x="0" y="160" width="36" height="8"/><rect class="segment fixed" x="0" y="146" width="36" height="8"/><rect class="segment fixed" x="0" y="132" width="36" height="8"/><rect class="segment dynamic c1-s5" x="0" y="118" width="36" height="8"/><rect class="segment dynamic c1-s6" x="0" y="104" width="36" height="8"/><rect class="segment dynamic c1-s7" x="0" y="90" width="36" height="8"/><rect class="segment dynamic c1-s8" x="0" y="76" width="36" height="8"/>
  </g>
  <g transform="translate(88 0)">
    <rect class="segment fixed" x="0" y="174" width="36" height="8"/><rect class="segment fixed" x="0" y="160" width="36" height="8"/><rect class="segment fixed" x="0" y="146" width="36" height="8"/><rect class="segment fixed" x="0" y="132" width="36" height="8"/><rect class="segment dynamic c2-s5" x="0" y="118" width="36" height="8"/><rect class="segment dynamic c2-s6" x="0" y="104" width="36" height="8"/><rect class="segment dynamic c2-s7" x="0" y="90" width="36" height="8"/><rect class="segment dynamic c2-s8" x="0" y="76" width="36" height="8"/>
  </g>
  <g transform="translate(142 0)">
    <rect class="segment fixed" x="0" y="174" width="36" height="8"/><rect class="segment fixed" x="0" y="160" width="36" height="8"/><rect class="segment dynamic c3-s3" x="0" y="146" width="36" height="8"/><rect class="segment dynamic c3-s4" x="0" y="132" width="36" height="8"/><rect class="segment dynamic c3-s5" x="0" y="118" width="36" height="8"/><rect class="segment dynamic c3-s6" x="0" y="104" width="36" height="8"/><rect class="segment dynamic c3-s7" x="0" y="90" width="36" height="8"/><rect class="segment dynamic c3-s8" x="0" y="76" width="36" height="8"/>
  </g>
  <g transform="translate(196 0)">
    <rect class="segment fixed" x="0" y="174" width="36" height="8"/><rect class="segment fixed" x="0" y="160" width="36" height="8"/><rect class="segment fixed" x="0" y="146" width="36" height="8"/><rect class="segment fixed" x="0" y="132" width="36" height="8"/><rect class="segment dynamic c4-s5" x="0" y="118" width="36" height="8"/><rect class="segment dynamic c4-s6" x="0" y="104" width="36" height="8"/><rect class="segment dynamic c4-s7" x="0" y="90" width="36" height="8"/><rect class="segment dynamic c4-s8" x="0" y="76" width="36" height="8"/>
  </g>
  <g transform="translate(250 0)">
    <rect class="segment fixed" x="0" y="174" width="36" height="8"/><rect class="segment fixed" x="0" y="160" width="36" height="8"/><rect class="segment fixed" x="0" y="146" width="36" height="8"/><rect class="segment fixed" x="0" y="132" width="36" height="8"/><rect class="segment dynamic c5-s5" x="0" y="118" width="36" height="8"/><rect class="segment dynamic c5-s6" x="0" y="104" width="36" height="8"/><rect class="segment dynamic c5-s7" x="0" y="90" width="36" height="8"/><rect class="segment dynamic c5-s8" x="0" y="76" width="36" height="8"/>
  </g>
</svg>
