<svg xmlns="http://www.w3.org/2000/svg" width="300" height="40" viewBox="0 0 600 80" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Audio wave — blue theme</title>
  <desc id="desc">A seamless, infinitely scrolling sine-wave animation evoking a live audio waveform, in dark blue for light interfaces.</desc>
  <defs>
    <style>
      :root { --loader-color:#123A73; }
      .wave-path { fill:none; stroke:var(--loader-color); vector-effect:non-scaling-stroke; }
      .layer { animation:scroll-fast 7s linear infinite; }
      .layer-slow { animation:scroll-slow 13s linear infinite reverse; opacity:.55; }
      @keyframes scroll-fast { from { transform:translateX(0); } to { transform:translateX(-600px); } }
      @keyframes scroll-slow { from { transform:translateX(0); } to { transform:translateX(-600px); } }
      @media (prefers-reduced-motion: reduce) {
        .layer, .layer-slow { animation:none; }
      }
    </style>
  </defs>
  <clipPath id="frame"><rect x="0" y="0" width="600" height="80"/></clipPath>
